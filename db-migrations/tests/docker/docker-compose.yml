# JTL-Robotico — ephemeral E2E MSSQL container
#
# A disposable SQL Server 2022 instance used to run the full migration E2E:
# both grate chains (Ebene A eazybusiness + Ebene B RoboticoOps), the ported
# *_Tests.sql suites, and the SQL-Agent-driven test-mandant reset pipeline.
#
# PROD parity: image tag matches the production engine family (SQL Server 2022,
# Latin1_General_CI_AS collation, SQL Agent enabled). The TEST server
# vm-sql-test1 runs SQL 2025 — see README §"SQL 2022 vs test1 2025".
#
# Lifecycle (see setup.ps1 / teardown.ps1 — do not run compose by hand):
#   pwsh setup.ps1        # generate secrets, up -d, wait healthy, verify
#   pwsh teardown.ps1     # down -v (full wipe, volume included)
#
# Secrets come from .env.local (gitignored, generated by setup.ps1). Compose is
# always invoked with `--env-file .env.local`; there is no committed .env.
#
# Port 14330 (host) -> 1433 (container). 1433/1434 are deliberately avoided:
# excel_ekl's dev container already binds 1434, and a local SQL Server may hold
# 1433.

# Explicit project name — without it compose derives the name from this folder
# ('docker'), which collides with other repos' docker/ compose projects (spurious
# "orphan containers" warnings). Pin it so this harness is fully isolated.
name: robotico-e2e

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: robotico-e2e-mssql
    # Init-script fixes named-volume ownership, then drops to the mssql user.
    user: root
    entrypoint: /entrypoint.sh
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?set in .env.local (run setup.ps1)}
      - MSSQL_PID=Developer          # full engine features for dev/test
      - MSSQL_AGENT_ENABLED=true     # REQUIRED: the reset E2E runs a SQL Agent job
      - MSSQL_MEMORY_LIMIT_MB=3584   # 3.5 GB (leave headroom for the OS)
      # Match JTL-Wawi's native collation. Linux images default system DBs to
      # SQL_Latin1_General_CP1_CI_AS, but JTL backups carry Latin1_General_CI_AS;
      # the mismatch breaks JTL queries that touch tempdb. Takes effect only on
      # FIRST volume init — an existing volume keeps its original collation.
      - MSSQL_COLLATION=Latin1_General_CI_AS
    ports:
      - "14330:1433"
    volumes:
      - robotico-e2e-mssql-data:/var/opt/mssql/data
      - ./entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      # SQL Server up and answering (not the restored DB — that lands post-start).
      # -C trusts the self-signed server cert; -No keeps output to the exit code.
      test: /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -No
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6g
        reservations:
          memory: 2g
    restart: unless-stopped

volumes:
  robotico-e2e-mssql-data:
    name: robotico-e2e-mssql-data
